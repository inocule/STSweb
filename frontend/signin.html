<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RooME - Sign In</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  
  <link rel="stylesheet" href="style.css" />
</head>
<body class="signin-page-body">

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">
       <img src="./Images/RooME.webp" alt="RooME Logo" onclick="window.location.href='index.html'" style="cursor:pointer;">
    </div>

    <nav>
      <ul class="nav-links">
        <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
        <li><a href="map.html"><i class="fa-solid fa-magnifying-glass"></i> Map</a></li>
      </ul>
    </nav>

    <button class="signin-btn" onclick="window.location.href='signin.html'">Sign In</button>
  </header>

  <div class="signin-container">
    <div class="signin-card">
      
      <!-- Header -->
      <div class="signin-header">
        <a href="index.html">
          <img src="./Images/RooME.webp" alt="RooME Logo" class="signin-logo">
        </a>
        <p class="welcome-text">Welcome back!</p>
      </div>

      <!-- Role Toggle -->
      <div class="role-toggle">
        <button class="role-btn active">
          <i class="fa-regular fa-user"></i> Student
        </button>
        <button class="role-btn">
          <i class="fa-solid fa-building"></i> Owner
        </button>
      </div>

      <!-- Form -->
      <form class="signin-form" action="#" method="POST">

        <!-- Error message -->
        <div id="auth-error" style="display:none;background:#fff0f3;border:1px solid #fecdd3;color:#9b1c1c;padding:12px 16px;border-radius:10px;font-size:14px;"></div>

        <!-- Name field (register only) -->
        <div class="form-group" id="name-group" style="display:none;">
          <label>Full Name</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-user prefix-icon"></i>
            <input type="text" id="name-input" placeholder="Your full name">
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-envelope prefix-icon"></i>
            <input type="email" placeholder="your@email.com" required>
            <i class="fa-solid fa-ellipsis suffix-icon"></i>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock prefix-icon"></i>
            <input type="password" placeholder="••••••••" required>
            <i class="fa-solid fa-ellipsis suffix-icon"></i>
          </div>
        </div>

        <div class="form-actions">
          <label class="remember-me">
            <input type="checkbox">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn">Sign In</button>

      </form>

      <div class="signup-prompt">
        Don't have an account? <a href="#">Sign Up</a>
      </div>

      <!-- Secondary Auth -->
      <div class="divider">
        <span>Or continue with</span>
      </div>

      <div class="social-auth">
        <button class="social-btn">Google</button>
        <button class="social-btn">Facebook</button>
      </div>

    </div>
  </div>

  <div class="signin-footer">
    Students: Find your perfect dorm near campus
  </div>

  <script src="api.js"></script>
  <script>
    // If already logged in, redirect
    const _existingUser = getUser();
    if (_existingUser) {
      window.location.href = _existingUser.role === 'owner' ? 'dashboard-owner.html' : 'dashboard-student.html';
    }

    // Role toggle
    let selectedRole = 'student';
    let isRegisterMode = false;

    const roleBtns = document.querySelectorAll('.role-btn');
    roleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        roleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRole = btn.textContent.trim().toLowerCase().includes('student') ? 'student' : 'owner';
      });
    });

    // Sign Up toggle
    const signupLink = document.querySelector('.signup-prompt a');
    const submitBtn  = document.querySelector('.submit-btn');
    const formTitle  = document.querySelector('.welcome-text');
    const nameGroup  = document.getElementById('name-group');

    signupLink.addEventListener('click', (e) => {
      e.preventDefault();
      isRegisterMode = !isRegisterMode;
      if (isRegisterMode) {
        formTitle.textContent = 'Create your account';
        submitBtn.textContent = 'Sign Up';
        signupLink.textContent = 'Sign In instead';
        document.querySelector('.signup-prompt').firstChild.textContent = 'Already have an account? ';
        nameGroup.style.display = 'flex';
      } else {
        formTitle.textContent = 'Welcome back!';
        submitBtn.textContent = 'Sign In';
        signupLink.textContent = 'Sign Up';
        document.querySelector('.signup-prompt').firstChild.textContent = "Don't have an account? ";
        nameGroup.style.display = 'none';
      }
    });

    // Form submit
    document.querySelector('.signin-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('auth-error');
      errEl.style.display = 'none';

      const email    = document.querySelector('input[type="email"]').value.trim();
      const password = document.querySelector('input[type="password"]').value;
      const name     = document.getElementById('name-input')?.value.trim();

      submitBtn.textContent = isRegisterMode ? 'Creating account…' : 'Signing in…';
      submitBtn.disabled = true;

      try {
        const endpoint = isRegisterMode ? '/register' : '/login';
        const body = isRegisterMode
          ? { name, email, password, role: selectedRole }
          : { email, password, role: selectedRole };

        const data = await apiFetch('/auth' + endpoint, { method: 'POST', body: JSON.stringify(body) });
        saveAuth(data.token, data.user);
        window.location.href = data.user.role === 'owner' ? 'dashboard-owner.html' : 'dashboard-student.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        submitBtn.textContent = isRegisterMode ? 'Sign Up' : 'Sign In';
        submitBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
